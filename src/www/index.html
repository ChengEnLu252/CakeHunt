<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>🎂 CakeHunt</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎂</text></svg>">
  <link href="dist/bootstrap/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --pink: #e91e8c;
      --pink-light: #f48fb1;
      --pink-pale: rgba(233, 30, 140, 0.12);
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #fff5f9 !important;
      overflow: hidden;
    }

    body::before {
      content: "🎂  🍰  🧁  🎂  🍰  🧁  🎂  🍰  🧁  🎂  🍰  🧁  🎂  🍰  🧁";
      display: block;
      text-align: center;
      font-size: 1.1rem;
      letter-spacing: 0.3rem;
      padding: 6px 0;
      background-color: #fde8f3;
      color: var(--pink);
      opacity: 0.7;
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 9999;
      pointer-events: none;
    }

    .welcome-card {
      text-align: center;
      background: #fff;
      border-radius: 24px;
      padding: 56px 64px;
      box-shadow: 0 8px 40px rgba(233, 30, 140, 0.12);
      border: 1.5px solid #fce4f3;
      animation: fadeIn 0.8s ease-out;
      max-width: 480px;
      width: 90%;
    }

    .cake-emoji {
      font-size: 5rem;
      display: block;
      margin-bottom: 1.2rem;
      animation: bounce 2.2s ease-in-out infinite;
    }

    .welcome-title {
      font-size: 1.7rem;
      font-weight: 700;
      color: var(--pink);
      margin-bottom: 0.5rem;
    }

    .welcome-sub {
      font-size: 0.9rem;
      color: #ccc;
      margin-bottom: 2.2rem;
      letter-spacing: 0.05em;
    }

    .btn-start {
      display: inline-block;
      padding: 14px 52px;
      background-color: var(--pink);
      color: #fff !important;
      font-size: 1.05rem;
      font-weight: 700;
      border: none;
      border-radius: 999px !important;
      cursor: pointer;
      text-decoration: none;
      box-shadow: 0 6px 20px var(--pink-pale);
      transition: all 0.2s ease;
    }

    .btn-start:hover {
      background-color: #c4177a;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(233, 30, 140, 0.3);
      color: #fff !important;
      text-decoration: none;
    }

    .btn-start:active {
      transform: translateY(0);
    }

    .deco-hearts {
      margin-top: 2rem;
      font-size: 1.1rem;
      color: var(--pink-light);
      letter-spacing: 0.4rem;
      opacity: 0.6;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }
  </style>
</head>
<body>
  <div class="welcome-card">
    <span class="cake-emoji">🎂</span>
    <div class="welcome-title">準備好要開始搶蛋糕了嗎？</div>
    <div class="welcome-sub">CakeHunt · 多平台自動化搶票系統</div>
    <a class="btn-start" href="/settings.html">🎯 準備好了，開搶！</a>
    <div class="deco-hearts">🍰 ♡ 🧁 ♡ 🍰 ♡ 🧁</div>
  </div>
</body>
</html>

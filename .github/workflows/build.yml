name: Build CakeHunt
on:
  push:
    tags:
      - "v*"
jobs:
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyinstaller && pip install -r requirement.txt
      - name: Build CakeHunt
        run: pyinstaller --onedir --windowed --add-data "src/www:www" --add-data "src/assets:assets" --hidden-import tornado.websocket --hidden-import ddddocr --hidden-import multi_account_manager --paths src --name "CakeHunt" src/settings.py
      - name: Build nodriver_tixcraft
        run: pyinstaller --onedir --windowed --add-data "src/assets:assets" --add-data "src/platforms:platforms" --hidden-import ddddocr --hidden-import multi_account_manager --paths src --name "nodriver_tixcraft" src/nodriver_tixcraft.py
      - name: Package Mac output
        run: |
          chmod +x dist/CakeHunt/CakeHunt
          chmod +x dist/nodriver_tixcraft/nodriver_tixcraft
          printf '#!/bin/bash\nDIR="$(cd "$(dirname "$0")" && pwd)"\nxattr -cr "$DIR/CakeHunt"\nxattr -cr "$DIR/nodriver_tixcraft"\nchmod +x "$DIR/CakeHunt/CakeHunt"\nchmod +x "$DIR/nodriver_tixcraft/nodriver_tixcraft"\nopen "$DIR/CakeHunt/CakeHunt"\n' > dist/開啟CakeHunt.command
          chmod +x dist/開啟CakeHunt.command
          cd dist
          tar -czf CakeHunt-Mac.tar.gz CakeHunt nodriver_tixcraft 開啟CakeHunt.command
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CakeHunt-Mac
          compression-level: 0
          path: dist/CakeHunt-Mac.tar.gz
name: Build CakeHunt

on:
  push:
    tags:
      - "v*"

jobs:
  # ════════════════════════════════════════════════════════
  # Mac 打包
  # ════════════════════════════════════════════════════════
  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirement.txt

      - name: Build CakeHunt (settings)
        run: |
          pyinstaller \
            --onedir --console \
            --add-data "src/www:www" \
            --add-data "src/assets:assets" \
            --paths src \
            --hidden-import tornado \
            --hidden-import tornado.web \
            --hidden-import tornado.ioloop \
            --hidden-import tornado.httpserver \
            --hidden-import tornado.websocket \
            --hidden-import multi_account_manager \
            --hidden-import util \
            --hidden-import NonBrowser \
            --hidden-import ddddocr \
            --hidden-import onnxruntime \
            --hidden-import "onnxruntime.capi.onnxruntime_pybind11_state" \
            --hidden-import "PIL" \
            --hidden-import "PIL.Image" \
            --hidden-import numpy \
            --hidden-import requests \
            --hidden-import platform \
            --hidden-import signal \
            --name "CakeHunt" \
            src/settings.py

      - name: Build nodriver_tixcraft
        run: |
          pyinstaller \
            --onedir --console \
            --add-data "src/assets:assets" \
            --add-data "src/www:www" \
            --paths src \
            --hidden-import ddddocr \
            --hidden-import onnxruntime \
            --hidden-import "onnxruntime.capi.onnxruntime_pybind11_state" \
            --hidden-import zendriver \
            --hidden-import "zendriver.cdp" \
            --hidden-import "zendriver.core" \
            --hidden-import util \
            --hidden-import NonBrowser \
            --hidden-import chrome_downloader \
            --hidden-import nodriver_common \
            --hidden-import settings \
            --hidden-import multi_account_manager \
            --hidden-import "platforms.facebook" \
            --hidden-import "platforms.fansigo" \
            --hidden-import "platforms.cityline" \
            --hidden-import "platforms.famiticket" \
            --hidden-import "platforms.ticketplus" \
            --hidden-import "platforms.funone" \
            --hidden-import "platforms.kktix" \
            --hidden-import "platforms.tixcraft" \
            --hidden-import "platforms.ibon" \
            --hidden-import "platforms.kham" \
            --hidden-import "platforms.hkticketing" \
            --hidden-import "PIL" \
            --hidden-import "PIL.Image" \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import cryptography \
            --hidden-import playsound \
            --hidden-import pyperclip \
            --hidden-import platform \
            --hidden-import signal \
            --name "nodriver_tixcraft" \
            src/nodriver_tixcraft.py

      - name: Package Mac output
        run: |
          # 修復 PyInstaller 在 Mac 上產生的壞掉 Python symlink
          # 指向 Python.framework/... 但實際檔案是 python3.11
          for dir in dist/CakeHunt/_internal dist/nodriver_tixcraft/_internal; do
            if [ -L "$dir/Python" ] && [ ! -e "$dir/Python" ]; then
              rm "$dir/Python"
              ln -s python3.11 "$dir/Python"
              echo "[Fix] Repaired broken Python symlink in $dir"
            fi
          done

          chmod +x dist/CakeHunt/CakeHunt
          chmod +x dist/nodriver_tixcraft/nodriver_tixcraft
          xattr -cr dist/CakeHunt || true
          xattr -cr dist/nodriver_tixcraft || true

          cat > dist/開啟CakeHunt.command << 'EOF'
          #!/bin/bash
          DIR="$(cd "$(dirname "$0")" && pwd)"
          xattr -cr "$DIR/CakeHunt" 2>/dev/null || true
          xattr -cr "$DIR/nodriver_tixcraft" 2>/dev/null || true
          chmod +x "$DIR/CakeHunt/CakeHunt"
          chmod +x "$DIR/nodriver_tixcraft/nodriver_tixcraft"
          "$DIR/CakeHunt/CakeHunt"
          EOF
          chmod +x dist/開啟CakeHunt.command

          cd dist
          COPYFILE_DISABLE=1 tar -czf CakeHunt-Mac.tar.gz \
            CakeHunt \
            nodriver_tixcraft \
            開啟CakeHunt.command

      - name: Upload Mac artifact
        uses: actions/upload-artifact@v4
        with:
          name: CakeHunt-Mac
          compression-level: 0
          path: dist/CakeHunt-Mac.tar.gz

  # ════════════════════════════════════════════════════════
  # Windows 打包
  # ════════════════════════════════════════════════════════
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install pyinstaller
          pip install -r requirement.txt

      # ⚠️ Windows 的 --add-data 分隔符是 ; 而不是 :
      - name: Build CakeHunt (settings)
        shell: bash
        run: |
          pyinstaller \
            --onedir --console \
            --add-data "src/www;www" \
            --add-data "src/assets;assets" \
            --paths src \
            --hidden-import tornado \
            --hidden-import tornado.web \
            --hidden-import tornado.ioloop \
            --hidden-import tornado.httpserver \
            --hidden-import tornado.websocket \
            --hidden-import multi_account_manager \
            --hidden-import util \
            --hidden-import NonBrowser \
            --hidden-import ddddocr \
            --hidden-import onnxruntime \
            --hidden-import "onnxruntime.capi.onnxruntime_pybind11_state" \
            --hidden-import "PIL" \
            --hidden-import "PIL.Image" \
            --hidden-import numpy \
            --hidden-import requests \
            --hidden-import platform \
            --hidden-import signal \
            --name "CakeHunt" \
            src/settings.py

      - name: Build nodriver_tixcraft
        shell: bash
        run: |
          pyinstaller \
            --onedir --console \
            --add-data "src/assets;assets" \
            --add-data "src/www;www" \
            --paths src \
            --hidden-import ddddocr \
            --hidden-import onnxruntime \
            --hidden-import "onnxruntime.capi.onnxruntime_pybind11_state" \
            --hidden-import zendriver \
            --hidden-import "zendriver.cdp" \
            --hidden-import "zendriver.core" \
            --hidden-import util \
            --hidden-import NonBrowser \
            --hidden-import chrome_downloader \
            --hidden-import nodriver_common \
            --hidden-import settings \
            --hidden-import multi_account_manager \
            --hidden-import "platforms.facebook" \
            --hidden-import "platforms.fansigo" \
            --hidden-import "platforms.cityline" \
            --hidden-import "platforms.famiticket" \
            --hidden-import "platforms.ticketplus" \
            --hidden-import "platforms.funone" \
            --hidden-import "platforms.kktix" \
            --hidden-import "platforms.tixcraft" \
            --hidden-import "platforms.ibon" \
            --hidden-import "platforms.kham" \
            --hidden-import "platforms.hkticketing" \
            --hidden-import "PIL" \
            --hidden-import "PIL.Image" \
            --hidden-import cv2 \
            --hidden-import numpy \
            --hidden-import requests \
            --hidden-import urllib3 \
            --hidden-import certifi \
            --hidden-import cryptography \
            --hidden-import playsound \
            --hidden-import pyperclip \
            --hidden-import platform \
            --hidden-import signal \
            --collect-all zendriver \
            --collect-all ddddocr \
            --name "nodriver_tixcraft" \
            src/nodriver_tixcraft.py

      # ⚠️ 兩個 exe 必須放在同一個資料夾
      # settings.py 用 cwd（get_app_root）找 nodriver_tixcraft.exe
      - name: Package Windows output
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "dist\CakeHunt-Win" -Force

          Copy-Item "dist\CakeHunt\CakeHunt.exe"                        "dist\CakeHunt-Win\"
          Copy-Item "dist\nodriver_tixcraft\nodriver_tixcraft.exe"       "dist\CakeHunt-Win\"

          Copy-Item -Recurse "dist\CakeHunt\_internal"                   "dist\CakeHunt-Win\"
          Copy-Item -Recurse -Force "dist\nodriver_tixcraft\_internal\*" "dist\CakeHunt-Win\_internal\"

          Copy-Item -Recurse "src\assets" "dist\CakeHunt-Win\"
          Copy-Item -Recurse "src\www"    "dist\CakeHunt-Win\"

          Compress-Archive -Path "dist\CakeHunt-Win\*" `
                           -DestinationPath "dist\CakeHunt-Win.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CakeHunt-Windows
          compression-level: 0
          path: dist/CakeHunt-Win.zip
name: Build CakeHunt
on:
  push:
    tags:
      - "v*"
jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyinstaller && pip install -r requirement.txt
      - name: Build CakeHunt
        run: pyinstaller --onefile --noconsole --add-data "src/www;www" --add-data "src/assets;assets" --hidden-import tornado.websocket --hidden-import ddddocr --hidden-import multi_account_manager --paths src --name "CakeHunt" src/settings.py
      - name: Build nodriver_tixcraft
        run: pyinstaller --onefile --noconsole --add-data "src/assets;assets" --add-data "src/platforms;platforms" --hidden-import ddddocr --hidden-import multi_account_manager --paths src --name "nodriver_tixcraft" src/nodriver_tixcraft.py
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CakeHunt-Windows
          compression-level: 0
          path: |
            dist/CakeHunt.exe
            dist/nodriver_tixcraft.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install pyinstaller && pip install -r requirement.txt
      - name: Build CakeHunt
        run: pyinstaller --onedir --windowed --add-data "src/www:www" --add-data "src/assets:assets" --hidden-import tornado.websocket --hidden-import ddddocr --hidden-import multi_account_manager --paths src --name "CakeHunt" src/settings.py
      - name: Build nodriver_tixcraft
        run: pyinstaller --onedir --windowed --add-data "src/assets:assets" --add-data "src/platforms:platforms" --hidden-import ddddocr --hidden-import multi_account_manager --paths src --name "nodriver_tixcraft" src/nodriver_tixcraft.py
      - name: Zip Mac output
        run: |
          cd dist
          zip -r CakeHunt-Mac.zip CakeHunt nodriver_tixcraft
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CakeHunt-Mac
          compression-level: 0
          path: dist/CakeHunt-Mac.zip